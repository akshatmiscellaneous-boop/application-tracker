<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Log — track your internship & job applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #16233A;
    --ink-light: #1F3153;
    --paper: #EFE6CC;
    --paper-line: #D8CBA0;
    --paper-dark: #E3D8B8;
    --stamp-red: #A6321D;
    --stamp-green: #2F6B4F;
    --stamp-blue: #2C4A73;
    --stamp-gray: #6B675C;
    --text-ink: #1D2B3A;
    --text-muted: #7A6F55;
    --cream-text: #F5EFE0;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ink);
    color: var(--cream-text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 2.5rem 1.25rem 4rem;
  }

  .wrap {
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
    border-bottom: 1px solid rgba(245,239,224,0.2);
    padding-bottom: 1.5rem;
  }

  h1 {
    font-family: 'Special Elite', monospace;
    font-size: 1.65rem;
    font-weight: 400;
    margin: 0 0 0.4rem;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }

  .subhead {
    color: rgba(245,239,224,0.65);
    font-size: 0.95rem;
    margin: 0;
  }

  .subhead .count {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--cream-text);
    font-weight: 600;
  }

  /* --- form card --- */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.9rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: rgba(245,239,224,0.06);
    border: 1px solid rgba(245,239,224,0.15);
    border-radius: 6px;
    padding: 0.9rem 1rem;
    text-align: center;
  }

  .stat-number {
    font-family: 'Special Elite', monospace;
    font-size: 1.8rem;
    color: var(--cream-text);
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: rgba(245,239,224,0.55);
  }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: 1fr; }
  }

  .progress-wrap {
    margin-bottom: 1.2rem;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: rgba(245,239,224,0.65);
    margin-bottom: 0.35rem;
    font-family: 'IBM Plex Mono', monospace;
  }

  .progress-track {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: rgba(245,239,224,0.12);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--stamp-blue), var(--stamp-green));
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .badges-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .badge-chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    padding: 0.35rem 0.7rem;
    border-radius: 20px;
    border: 1px solid rgba(245,239,224,0.2);
    color: rgba(245,239,224,0.35);
    background: rgba(245,239,224,0.04);
    transition: all 0.2s ease;
  }

  .badge-chip.unlocked {
    color: var(--cream-text);
    border-color: rgba(227,178,60,0.5);
    background: rgba(227,178,60,0.12);
  }

  .badge-chip .badge-icon {
    filter: grayscale(1);
    opacity: 0.4;
  }

  .badge-chip.unlocked .badge-icon {
    filter: none;
    opacity: 1;
  }

  .form-card {
    background: var(--paper);
    color: var(--text-ink);
    border-radius: 6px;
    padding: 1.25rem 1.5rem 1.5rem;
    margin-bottom: 2rem;
    box-shadow: 0 6px 0 rgba(0,0,0,0.15);
  }

  .form-card h2 {
    font-family: 'Special Elite', monospace;
    font-size: 1rem;
    font-weight: 400;
    margin: 0 0 1rem;
    color: var(--text-ink);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1.3fr 1.3fr 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 0.9rem;
  }

  @media (max-width: 620px) {
    .form-row { grid-template-columns: 1fr 1fr; }
  }

  label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
  }

  input, select {
    width: 100%;
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--paper-line);
    border-radius: 4px;
    background: #FBF7EA;
    color: var(--text-ink);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
  }

  input:focus, select:focus {
    outline: 2px solid var(--stamp-blue);
    outline-offset: 1px;
  }

  .form-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .threshold-control {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .threshold-control input {
    width: 55px;
    text-align: center;
  }

  button {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    border: none;
    border-radius: 5px;
    padding: 0.65rem 1.2rem;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
  }

  button:hover:not(:disabled) {
    transform: translateY(-1px);
  }

  button:active { transform: scale(0.97); }

  .btn-add {
    background: var(--ink);
    color: var(--cream-text);
  }

  .btn-add:hover { background: var(--ink-light); }

  /* --- entries --- */
  #contact-name-wrap, #contact-detail-wrap {
    display: none; /* shown via JS only when channel is DM or Cold Email */
  }

  .company-group {
    margin-bottom: 1.1rem;
  }

  .company-header {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0 0.2rem;
    margin-bottom: 0.5rem;
  }

  .company-header h3 {
    font-family: 'Special Elite', monospace;
    font-weight: 400;
    font-size: 1.15rem;
    color: var(--cream-text);
    margin: 0;
  }

  .company-header .attempt-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: rgba(245,239,224,0.55);
  }

  .contact-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.76rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  .channel-tag {
    font-size: 0.72rem;
    color: var(--stamp-blue);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .status-quip {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-style: italic;
    margin-left: 0.3rem;
  }

  .btn-ai {
    background: var(--stamp-blue);
    color: var(--cream-text);
    font-size: 0.78rem;
    padding: 0.4rem 0.7rem;
  }

  .btn-ai:hover { background: #223d61; }

  .btn-ai:disabled {
    opacity: 0.6;
    cursor: wait;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,16,26,0.75);
    z-index: 50;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--paper);
    color: var(--text-ink);
    border-radius: 8px;
    max-width: 520px;
    width: 100%;
    padding: 1.5rem;
    box-shadow: 0 10px 0 rgba(0,0,0,0.2);
  }

  .modal-box h3 {
    font-family: 'Special Elite', monospace;
    font-weight: 400;
    font-size: 1.05rem;
    margin: 0 0 0.9rem;
  }

  .modal-box textarea {
    width: 100%;
    min-height: 180px;
    padding: 0.8rem;
    border: 1px solid var(--paper-line);
    border-radius: 5px;
    background: #FBF7EA;
    color: var(--text-ink);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    line-height: 1.5;
    resize: vertical;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .modal-loading {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    padding: 1.5rem 0;
    text-align: center;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: rgba(245,239,224,0.5);
    font-family: 'Special Elite', monospace;
    font-size: 1rem;
  }

  .entry {
    position: relative;
    background: var(--paper);
    color: var(--text-ink);
    border-radius: 6px;
    padding: 1.1rem 1.4rem;
    margin-bottom: 1rem;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    flex-wrap: wrap;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .entry:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 rgba(0,0,0,0.18);
  }

  .entry.just-added {
    animation: entry-pop-in 0.4s ease-out;
  }

  @keyframes entry-pop-in {
    0% { opacity: 0; transform: translateY(-10px) scale(0.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .entry-main { flex: 1; min-width: 200px; }

  .entry-company {
    font-weight: 600;
    font-size: 1.05rem;
    margin: 0 0 0.15rem;
  }

  .entry-role {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin: 0 0 0.5rem;
  }

  .entry-meta {
    display: flex;
    gap: 0.9rem;
    flex-wrap: wrap;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .stamp {
    display: inline-block;
    font-family: 'Special Elite', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 0.3rem 0.7rem;
    border: 2px solid currentColor;
    border-radius: 4px;
    transform: rotate(-3deg);
    white-space: normal;
    max-width: 220px;
    line-height: 1.3;
  }

  .stamp-applied { color: var(--stamp-blue); }
  .stamp-interviewing { color: var(--stamp-green); }
  .stamp-offer { color: var(--stamp-green); background: rgba(47,107,79,0.08); }
  .stamp-rejected { color: var(--stamp-gray); }

  .status-select {
    display: inline-block;
    font-family: 'Special Elite', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.3rem 0.5rem;
    border: 2px solid currentColor;
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
  }

  .status-select option {
    font-family: 'Inter', sans-serif;
    text-transform: none;
    color: var(--text-ink);
  }

  .followup-flag {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-direction: column;
  }

  .followup-stamp {
    font-family: 'Special Elite', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--stamp-red);
    border: 2px solid var(--stamp-red);
    border-radius: 4px;
    padding: 0.3rem 0.6rem;
    transform: rotate(3deg);
    white-space: nowrap;
  }

  .followup-stamp.stage-2 {
    background: var(--stamp-red);
    color: var(--paper);
  }

  .entry-actions {
    display: flex;
    gap: 0.5rem;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--paper-line);
    color: var(--text-ink);
    font-size: 0.78rem;
    padding: 0.4rem 0.7rem;
  }

  .btn-ghost:hover { background: var(--paper-dark); }

  .btn-danger {
    background: transparent;
    border: 1px solid transparent;
    color: var(--stamp-gray);
    font-size: 0.78rem;
    padding: 0.4rem 0.5rem;
  }

  .btn-danger:hover { color: var(--stamp-red); }

  .status-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: rgba(245,239,224,0.5);
    margin-top: 1.5rem;
    text-align: center;
  }
  @keyframes confetti-fall {
    0% {
      transform: translate(0, 0) rotate(0deg);
      opacity: 0.9;
    }
    100% {
      transform: translate(var(--drift), 105vh) rotate(var(--rotate));
      opacity: 0.4;
    }
  }
</style>

<body>
<div class="wrap">

  <header>
    <h1>Let's go get that job/internship</h1>
    <p class="subhead">Tracking <span class="count" id="count-display">0</span> applications. Anything gone quiet gets flagged automatically.</p>
  </header>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-number" id="stat-total">0</div>
      <div class="stat-label">Applications logged</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-pending">0</div>
      <div class="stat-label">Follow-ups pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-sent">0</div>
      <div class="stat-label">Follow-ups sent</div>
    </div>
  </div>

  <div class="progress-wrap" id="progress-wrap" style="display:none;">
    <div class="progress-label">
      <span>Response rate</span>
      <span id="progress-percent">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%;"></div>
    </div>
  </div>

  <div class="badges-strip" id="badges-strip"></div>

  <div class="form-card">
    <h2>Log a new application</h2>

    <div class="form-row" id="single-company-row">
      <div>
        <label for="in-company">Company</label>
        <input type="text" id="in-company" placeholder="e.g. Zomato">
      </div>
      <div>
        <label for="in-role">Role</label>
        <input type="text" id="in-role" placeholder="e.g. SDE intern">
      </div>
      <div>
        <label for="in-status">Status</label>
        <select id="in-status">
          <option value="Applied">Applied</option>
          <option value="Interviewing">Interviewing</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>
      </div>
      <div>
        <label for="in-date">Date applied</label>
        <input type="date" id="in-date">
      </div>
    </div>
    <div class="form-row" id="channel-row">
      <div>
        <label for="in-channel">Applied via</label>
        <select id="in-channel">
          <option value="LinkedIn DM">LinkedIn DM</option>
          <option value="LinkedIn Job Post">LinkedIn job posting</option>
          <option value="Internshala">Internshala</option>
          <option value="Cold Email">Cold email</option>
          <option value="Company Website">Company website</option>
          <option value="Referral">Referral</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div id="contact-name-wrap">
        <label for="in-contact-name">Contact person</label>
        <input type="text" id="in-contact-name" placeholder="e.g. Priya Sharma, HR">
      </div>
      <div id="contact-detail-wrap" style="grid-column: span 2;">
        <label for="in-contact-detail">Their email / LinkedIn handle</label>
        <input type="text" id="in-contact-detail" placeholder="e.g. priya@zomato.com">
      </div>
    </div>
    <div class="form-row" style="grid-template-columns: 1fr 1fr;">
      <div>
        <label for="in-threshold1">Remind me to follow up after (days)</label>
        <input type="number" id="in-threshold1" value="7" min="1" max="60">
      </div>
      <div>
        <label for="in-threshold2">Remind me for a 2nd follow-up after (days)</label>
        <input type="number" id="in-threshold2" value="5" min="1" max="60">
      </div>
    </div>
    <div class="form-footer">
      <button class="btn-add" id="btn-add">Add application</button>
    </div>
  </div>

  <div id="entries-container"></div>

  <p class="status-msg" id="status-msg">Loading your log…</p>

</div>

<div class="modal-overlay" id="draft-modal">
  <div class="modal-box">
    <h3 id="draft-modal-title">Drafting your follow-up…</h3>
    <div id="draft-modal-body">
      <div class="modal-loading">Thinking of what to say…</div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="btn-copy-draft" style="display:none;">Copy text</button>
      <button class="btn-ai" id="btn-close-draft">Close</button>
    </div>
  </div>
</div>

<script>
/*
  HOW THIS WORKS (read this if you're learning to code from this file):

  1. We keep all applications in one JS array called `applications`.
  2. Every time it changes (add / delete / mark followed up), we save
     the whole array as one JSON string using window.storage.set().
     This is what makes your data persist even if you close the tab.
  3. On page load, we read it back with window.storage.get().
  4. render() rebuilds the visible list from the `applications` array
     every time something changes. This "re-render from data" pattern
     is one of the most useful habits in front-end coding.
*/

const STORAGE_KEY = 'applications';
let applications = [];
let justAddedId = null; // tracks the most recently added entry, so only it gets the pop-in animation

/*
  STORAGE ABSTRACTION
  --------------------
  This file needs to work in two different places:
    1. Inside Claude's artifact preview, where window.storage exists
       and persists your data across sessions on Claude's servers.
    2. Once you download this and host it yourself (e.g. on Netlify),
       where window.storage does NOT exist -- there's no Claude
       environment to talk to anymore. In that case we fall back to
       the browser's built-in localStorage, which saves data on the
       visitor's own device/browser instead.

  Everything else in the app just calls storageGet/storageSet below,
  so the rest of the code doesn't need to know or care which one is
  actually being used.
*/
const hasClaudeStorage = typeof window.storage !== 'undefined';

async function storageGet(key) {
  if (hasClaudeStorage) {
    try {
      const result = await window.storage.get(key, false);
      return result ? result.value : null;
    } catch (err) {
      return null; // key has never been set yet
    }
  }
  // Fallback: plain browser localStorage
  return localStorage.getItem(key);
}

async function storageSet(key, value) {
  if (hasClaudeStorage) {
    try {
      await window.storage.set(key, value, false);
      return true;
    } catch (err) {
      return false;
    }
  }
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (err) {
    return false;
  }
}

const STATUS_CLASS = {
  'Applied': 'stamp-applied',
  'Interviewing': 'stamp-interviewing',
  'Offer': 'stamp-offer',
  'Rejected': 'stamp-rejected'
};

// The underlying app.status value stays plain ("Applied", "Offer", etc) so
// all the follow-up logic elsewhere keeps working. This map is purely for
// what gets DISPLAYED on the stamp badge.
const STATUS_DISPLAY = {
  'Applied': "Let's keep our hopes high 🤞",
  'Interviewing': 'You got it, buddy! 🔥',
  'Offer': 'Hooraayyy! 🎉',
  'Rejected': 'Their loss, not yours 💪'
};

// Load saved data when the page opens
async function loadApplications() {
  const statusEl = document.getElementById('status-msg');
  const raw = await storageGet(STORAGE_KEY);
  applications = raw ? JSON.parse(raw) : [];
  statusEl.textContent = hasClaudeStorage
    ? 'Your data is saved automatically in this artifact.'
    : 'Your data is saved in this browser on this device.';
  render();
}

// Save the current array back to storage
async function saveApplications() {
  const ok = await storageSet(STORAGE_KEY, JSON.stringify(applications));
  if (!ok) {
    document.getElementById('status-msg').textContent =
      'Could not save just now -- your changes are visible but may not persist.';
  }
}

function daysSince(dateStr) {
  const applied = new Date(dateStr);
  const today = new Date();
  applied.setHours(0,0,0,0);
  today.setHours(0,0,0,0);
  const diffMs = today - applied;
  return Math.max(0, Math.round(diffMs / (1000 * 60 * 60 * 24)));
}

function updateStats() {
  const total = applications.length;

  // "Pending" = applications currently showing an active follow-up flag right now
  const pending = applications.filter(a => getFollowupStage(a) > 0).length;

  // "Sent" = total follow-up actions marked as sent across every application
  // (an app that had both Follow-up 1 and Follow-up 2 sent counts as 2 here)
  const sent = applications.reduce((sum, a) => sum + (a.followUpsSent || 0), 0);

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-sent').textContent = sent;

  updateProgressBar(total);
  updateBadges(total, sent);
}

function updateProgressBar(total) {
  const progressWrap = document.getElementById('progress-wrap');
  if (total === 0) {
    progressWrap.style.display = 'none';
    return;
  }
  progressWrap.style.display = 'block';

  // "Response rate" = share of applications that moved past plain "Applied"
  // into Interviewing, Offer, or Rejected -- i.e. you actually heard something back.
  const responded = applications.filter(a => a.status !== 'Applied').length;
  const percent = Math.round((responded / total) * 100);

  document.getElementById('progress-fill').style.width = percent + '%';
  document.getElementById('progress-percent').textContent = percent + '%';
}

// Badge definitions: each has an icon, label, and a check function that
// looks at the current data to decide if it's unlocked. Purely derived --
// no separate storage needed, so it can never get out of sync.
const BADGE_DEFS = [
  { icon: '🎯', label: 'First application', check: (apps) => apps.length >= 1 },
  { icon: '💪', label: '10 logged', check: (apps) => apps.length >= 10 },
  { icon: '🚀', label: '25 logged', check: (apps) => apps.length >= 25 },
  { icon: '✉️', label: '5 follow-ups sent', check: (apps) => apps.reduce((s,a) => s + (a.followUpsSent||0), 0) >= 5 },
  { icon: '🗣️', label: 'First interview', check: (apps) => apps.some(a => a.status === 'Interviewing' || a.status === 'Offer') },
  { icon: '🎉', label: 'First offer', check: (apps) => apps.some(a => a.status === 'Offer') },
];

function updateBadges() {
  const strip = document.getElementById('badges-strip');
  strip.innerHTML = BADGE_DEFS.map(badge => {
    const unlocked = badge.check(applications);
    return `
      <div class="badge-chip ${unlocked ? 'unlocked' : ''}" title="${unlocked ? 'Unlocked!' : 'Locked'}">
        <span class="badge-icon">${badge.icon}</span>
        <span>${badge.label}</span>
      </div>
    `;
  }).join('');
}

function render() {
  const container = document.getElementById('entries-container');
  document.getElementById('count-display').textContent = applications.length;
  updateStats();

  if (applications.length === 0) {
    container.innerHTML = '<div class="empty-state">Log is empty. Add your first application above.</div>';
    return;
  }

  // Group every attempt by company name (case-insensitive) so someone
  // who applied to Zomato 10 different ways sees them together, not
  // as 10 unrelated cards.
  const groups = {};
  applications.forEach(app => {
    const key = app.company.trim().toLowerCase();
    if (!groups[key]) groups[key] = { displayName: app.company, entries: [] };
    groups[key].entries.push(app);
  });

  // Companies with an active follow-up flag float to the top
  const groupList = Object.values(groups).sort((a, b) => {
    const aFlag = a.entries.some(needsFollowup) ? 1 : 0;
    const bFlag = b.entries.some(needsFollowup) ? 1 : 0;
    if (aFlag !== bFlag) return bFlag - aFlag;
    const aLatest = Math.max(...a.entries.map(e => new Date(e.dateApplied)));
    const bLatest = Math.max(...b.entries.map(e => new Date(e.dateApplied)));
    return bLatest - aLatest;
  });

  container.innerHTML = groupList.map(group => {
    // Within a company, show most recent attempt first
    const entries = [...group.entries].sort((a, b) => new Date(b.dateApplied) - new Date(a.dateApplied));

    const rows = entries.map(app => {
      const days = daysSince(app.dateApplied);
      const stage = getFollowupStage(app);
      const stampClass = STATUS_CLASS[app.status] || 'stamp-applied';
      const hasContact = app.contactName || app.contactDetail;

      let flagHtml = '';
      let actionHtml = '';
      if (stage === 1) {
        flagHtml = '<span class="followup-stamp">Follow-up 1</span>';
        actionHtml = `
          <button class="btn-ai" onclick="draftFollowupEmail('${app.id}')">Draft email</button>
          <button class="btn-ghost" onclick="markFollowedUp('${app.id}')">Mark sent</button>`;
      } else if (stage === 2) {
        flagHtml = '<span class="followup-stamp stage-2">Follow-up 2</span>';
        actionHtml = `
          <button class="btn-ai" onclick="draftFollowupEmail('${app.id}')">Draft email</button>
          <button class="btn-ghost" onclick="markFollowedUp('${app.id}')">Mark sent</button>`;
      } else if ((app.followUpsSent || 0) >= 2) {
        flagHtml = '<span class="channel-tag" style="color:var(--stamp-gray)">No reply after 2 follow-ups</span>';
      }

      return `
        <div class="entry ${app.id === justAddedId ? 'just-added' : ''}" data-id="${app.id}">
          <div class="entry-main">
            <p class="entry-role">${escapeHtml(app.role)} <span class="channel-tag">· ${escapeHtml(app.channel || 'Other')}</span></p>
            <div class="entry-meta">
              <span>Applied ${days === 0 ? 'today' : days + ' day' + (days === 1 ? '' : 's') + ' ago'}</span>
              <select class="status-select ${stampClass}" onchange="updateStatus('${app.id}', this.value)">
                <option value="Applied" ${app.status === 'Applied' ? 'selected' : ''}>Applied</option>
                <option value="Interviewing" ${app.status === 'Interviewing' ? 'selected' : ''}>Interviewing</option>
                <option value="Offer" ${app.status === 'Offer' ? 'selected' : ''}>Offer</option>
                <option value="Rejected" ${app.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
              </select>
              <span class="status-quip">${STATUS_DISPLAY[app.status] || ''}</span>
            </div>
            ${hasContact ? `<div class="contact-line">Contact: ${escapeHtml(app.contactName || '—')}${app.contactDetail ? ' · ' + escapeHtml(app.contactDetail) : ''}</div>` : ''}
          </div>
          <div class="followup-flag">
            ${flagHtml}
            <div class="entry-actions">
              ${actionHtml}
              <button class="btn-danger" onclick="deleteEntry('${app.id}')" aria-label="Delete entry">✕</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="company-group">
        <div class="company-header">
          <h3>${escapeHtml(group.displayName)}</h3>
          <span class="attempt-count">${entries.length} attempt${entries.length === 1 ? '' : 's'}</span>
        </div>
        ${rows}
      </div>
    `;
  }).join('');

  // Reset so the pop-in animation doesn't replay on the next re-render
  justAddedId = null;
}

// Returns 0 = no follow-up needed, 1 = time for follow-up 1, 2 = time for follow-up 2
// followUpsSent tracks how many have already been marked as sent (0, 1, or 2 = maxed out)
function getFollowupStage(app) {
  if (app.status === 'Offer' || app.status === 'Rejected') return 0;

  const sent = app.followUpsSent || 0;
  const daysQuiet = daysSince(app.lastTouched || app.dateApplied);

  if (sent === 0 && daysQuiet >= (app.threshold1 || 7)) return 1;
  if (sent === 1 && daysQuiet >= (app.threshold2 || 5)) return 2;
  return 0; // either not enough days passed yet, or already sent both follow-ups
}

function needsFollowup(app) {
  return getFollowupStage(app) > 0;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function addApplication() {
  const company = document.getElementById('in-company').value.trim();
  const role = document.getElementById('in-role').value.trim();
  const status = document.getElementById('in-status').value;
  const dateApplied = document.getElementById('in-date').value || new Date().toISOString().slice(0,10);
  const threshold1 = parseInt(document.getElementById('in-threshold1').value, 10) || 7;
  const threshold2 = parseInt(document.getElementById('in-threshold2').value, 10) || 5;
  const channel = document.getElementById('in-channel').value;
  const contactName = document.getElementById('in-contact-name').value.trim();
  const contactDetail = document.getElementById('in-contact-detail').value.trim();

  if (!company || !role) {
    alert('Add a company and role first.');
    return;
  }

  const newId = Date.now().toString();
  applications.push({
    id: newId,
    company,
    role,
    status,
    dateApplied,
    lastTouched: dateApplied,
    threshold1,
    threshold2,
    followUpsSent: 0,
    channel,
    contactName,
    contactDetail
  });

  justAddedId = newId;

  document.getElementById('in-company').value = '';
  document.getElementById('in-role').value = '';
  document.getElementById('in-status').value = 'Applied';
  document.getElementById('in-date').value = '';
  document.getElementById('in-contact-name').value = '';
  document.getElementById('in-contact-detail').value = '';
  document.getElementById('in-date').valueAsDate = new Date();

  render();
  await saveApplications();
}

async function markFollowedUp(id) {
  const app = applications.find(a => a.id === id);
  if (app) {
    app.followUpsSent = (app.followUpsSent || 0) + 1;
    app.lastTouched = new Date().toISOString().slice(0,10);
    render();
    await saveApplications();
  }
}

// --- Celebration effect for landing an offer ---
// Pure vanilla JS/CSS confetti -- no external library needed. Creates a
// bunch of small colored divs, gives each one a random starting position,
// color, and fall speed, then removes them once the animation finishes.
function celebrateOffer() {
  const colors = ['#A6321D', '#2F6B4F', '#2C4A73', '#E3B23C', '#F5EFE0'];
  const container = document.createElement('div');
  container.style.position = 'fixed';
  container.style.inset = '0';
  container.style.pointerEvents = 'none';
  container.style.zIndex = '999';
  document.body.appendChild(container);

  const pieceCount = 70;
  for (let i = 0; i < pieceCount; i++) {
    const piece = document.createElement('div');
    const size = 6 + Math.random() * 6;
    const startX = Math.random() * 100;
    const duration = 2.2 + Math.random() * 1.3;
    const delay = Math.random() * 0.3;
    const rotateAmount = 360 + Math.random() * 360;
    const drift = (Math.random() - 0.5) * 200;

    piece.style.position = 'absolute';
    piece.style.top = '-20px';
    piece.style.left = startX + 'vw';
    piece.style.width = size + 'px';
    piece.style.height = size * 0.6 + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.opacity = '0.9';
    piece.style.borderRadius = '1px';
    piece.style.setProperty('--drift', drift + 'px');
    piece.style.setProperty('--rotate', rotateAmount + 'deg');
    piece.style.animation = `confetti-fall ${duration}s ease-in ${delay}s forwards`;

    container.appendChild(piece);
  }

  // Clean up after the longest possible animation finishes
  setTimeout(() => container.remove(), 4200);
}

async function updateStatus(id, newStatus) {
  const app = applications.find(a => a.id === id);
  if (app) {
    const wasAlreadyOffer = app.status === 'Offer';
    app.status = newStatus;
    // Moving to Interviewing/Offer/Rejected means things are moving --
    // reset the silence clock so it doesn't immediately show a stale
    // follow-up flag based on the old status.
    app.lastTouched = new Date().toISOString().slice(0,10);
    render();
    await saveApplications();

    // Only celebrate when someone actively changes an existing entry TO
    // Offer -- not when Offer was simply picked in the add-application form.
    if (newStatus === 'Offer' && !wasAlreadyOffer) {
      celebrateOffer();
    }
  }
}

async function deleteEntry(id) {
  applications = applications.filter(a => a.id !== id);
  render();
  await saveApplications();
}

function updateContactFieldVisibility() {
  const channel = document.getElementById('in-channel').value;
  const showContact = channel === 'LinkedIn DM' || channel === 'Cold Email' || channel === 'Other';
  document.getElementById('contact-name-wrap').style.display = showContact ? 'block' : 'none';
  document.getElementById('contact-detail-wrap').style.display = showContact ? 'block' : 'none';
}

// --- AI-drafted follow-up email ---

function openDraftModal() {
  document.getElementById('draft-modal').classList.add('open');
}

function closeDraftModal() {
  document.getElementById('draft-modal').classList.remove('open');
}

document.getElementById('btn-close-draft').addEventListener('click', closeDraftModal);

async function draftFollowupEmail(id) {
  const app = applications.find(a => a.id === id);
  if (!app) return;

  const stage = getFollowupStage(app);
  const titleEl = document.getElementById('draft-modal-title');
  const bodyEl = document.getElementById('draft-modal-body');
  const copyBtn = document.getElementById('btn-copy-draft');

  titleEl.textContent = `Drafting follow-up ${stage} for ${app.company}…`;
  bodyEl.innerHTML = '<div class="modal-loading">Thinking of what to say…</div>';
  copyBtn.style.display = 'none';
  openDraftModal();

  const days = daysSince(app.dateApplied);
  const tone = stage === 1
    ? 'This is the FIRST follow-up. Keep it light, brief, and low-pressure -- just a friendly nudge.'
    : 'This is the SECOND and final follow-up after the first one got no reply. Keep it short, polite, and give them an easy, low-pressure way to close the loop (e.g. it is okay if the answer is no).';

  const prompt = `Write a short, natural follow-up message a student can send about a job/internship application. Do not use placeholders like [Your Name] -- write it as ready-to-send text with a generic friendly sign-off instead.

Details:
- Company: ${app.company}
- Role: ${app.role}
- Applied via: ${app.channel || 'application'}
- Days since applying: ${days}
- Contact person: ${app.contactName || 'not specified, keep it general'}
- ${tone}
- Match the tone to the channel: a LinkedIn DM should be more casual/short; an email should be a bit more structured with a one-line subject suggestion at the top.

Output ONLY the message text (with a subject line first if it's an email), nothing else -- no preamble, no explanation.`;

  try {
    // Notice this now calls OUR OWN backend function (running on Netlify),
    // not api.anthropic.com directly. Our function holds the secret key
    // and talks to Claude on our behalf -- the browser never sees the key.
    const response = await fetch('/.netlify/functions/draft-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();

    if (!response.ok) throw new Error(data.error || 'Request failed');

    const draftText = (data.draft || '').trim();

    titleEl.textContent = `Follow-up ${stage} draft — ${app.company}`;
    bodyEl.innerHTML = `<textarea id="draft-text-area" readonly>${escapeHtml(draftText)}</textarea>`;
    copyBtn.style.display = 'inline-block';
  } catch (err) {
    titleEl.textContent = `Couldn't draft this one`;
    bodyEl.innerHTML = `<div class="modal-loading">
      Something went wrong reaching the AI. If you're testing this locally
      (not yet deployed on Netlify), this button won't work until it's live --
      that's expected.
    </div>`;
    copyBtn.style.display = 'none';
  }
}

document.getElementById('btn-copy-draft').addEventListener('click', () => {
  const ta = document.getElementById('draft-text-area');
  if (ta) {
    ta.select();
    navigator.clipboard.writeText(ta.value).then(() => {
      document.getElementById('btn-copy-draft').textContent = 'Copied!';
      setTimeout(() => { document.getElementById('btn-copy-draft').textContent = 'Copy text'; }, 1500);
    });
  }
});

document.getElementById('in-channel').addEventListener('change', updateContactFieldVisibility);
document.getElementById('btn-add').addEventListener('click', addApplication);
document.getElementById('in-date').valueAsDate = new Date();
updateContactFieldVisibility();

loadApplications();
</script>
